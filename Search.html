<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังสินค้า - Repairaf</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #2575fc; margin: 0; }
        
        .btn-nav { background: #28a745; color: white; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; }
        .btn-nav:hover { background: #218838; }

        /* ส่วนควบคุมการค้นหา */
        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 2; padding: 12px; border: 2px solid #2575fc; border-radius: 8px; font-size: 16px; outline: none; }
        .category-filter { flex: 1; padding: 12px; border: 2px solid #2575fc; border-radius: 8px; font-size: 16px; background: white; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #2575fc; color: white; white-space: nowrap; }
        
        .img-container { display: flex; gap: 5px; flex-wrap: wrap; }
        .img-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .img-preview:hover { transform: scale(1.1); border-color: #2575fc; }
        
        .btn-edit { background: #ffc107; color: black; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .edit-input { width: 95%; padding: 5px; border: 1px solid #2575fc; border-radius: 4px; box-sizing: border-box; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 80%; height: 80%; }
        .modal-content { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }
        .close-modal { position: absolute; top: -40px; right: 0; color: white; font-size: 40px; cursor: pointer; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; padding: 16px; margin-top: -50px; color: white; font-weight: bold; font-size: 40px; background-color: rgba(0,0,0,0.3); border: none; user-select: none; }
        .next { right: -60px; } .prev { left: -60px; }
        .numbertext { color: #f2f2f2; font-size: 14px; padding: 8px 12px; position: absolute; top: -35px; left: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>📦 รายการสต็อกสินค้า</h2>
        <a href="add_Item.html" class="btn-nav">+ เพิ่มสินค้าใหม่</a>
    </div>

    <div class="filter-section">
        <select id="catFilter" class="category-filter" onchange="renderTable()">
            <option value="">-- ทุกหมวดหมู่ --</option>
            <option value="drive 08">drive 08</option>
            <option value="drive 16">drive 16</option>
            <option value="drive 32">drive 32</option>
            <option value="drive 48">drive 48</option>
            <option value="drive 64">drive 64</option>
            <option value="KPS">KPS</option>
            <option value="MFC">MFC</option>
            <option value="DSE">DSE</option>
            <option value="Safety95">Safety95</option>
            <option value="SafetyXP">SafetyXP</option>
            <option value="Com95">Com95</option>
            <option value="ComXP">ComXP</option>
            <option value="การ์ดจอ">การ์ดจอ</option>
        </select>
        <input type="text" id="searchInput" class="search-box" onkeyup="renderTable()" placeholder="🔍 ค้นหาจาก รหัส, อาการ หรือ ที่เก็บ...">
    </div>

    <table id="stockTable">
        <thead>
            <tr>
                <th>รูปภาพ</th>
                <th>วันที่</th>
                <th>หมวดหมู่</th>
                <th>รหัส</th>
                <th>อาการ</th>
                <th>จำนวน</th>
                <th>ที่เก็บ</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content-wrapper">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="numbertext" id="imageCounter">1 / 1</div>
        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <img class="modal-content" id="fullImage">
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>
</div>

<script>
    let stockData = JSON.parse(localStorage.getItem('myStock')) || [];
    let currentImageSet = [];
    let currentImageIndex = 0;

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const filterText = document.getElementById('searchInput').value.toUpperCase();
        const filterCat = document.getElementById('catFilter').value;
        tbody.innerHTML = '';
        
        stockData.forEach((item, index) => {
            // เงื่อนไขการกรอง: ตรวจสอบทั้งคำค้นหา และ หมวดหมู่
            const matchText = item.id.toUpperCase().includes(filterText) || 
                              item.name.toUpperCase().includes(filterText) || 
                              item.loc.toUpperCase().includes(filterText);
            const matchCat = filterCat === "" || item.cat === filterCat;

            if (matchText && matchCat) {
                const tr = document.createElement('tr');
                let imagesHtml = '<div class="img-container">';
                (item.imgs || []).forEach((img, imgIdx) => {
                    imagesHtml += `<img src="${img}" class="img-preview" onclick="openModal(${index}, ${imgIdx})">`;
                });
                imagesHtml += '</div>';

                tr.innerHTML = `
                    <td>${imagesHtml}</td>
                    <td>${new Date(item.date).toLocaleDateString('th-TH')}</td>
                    <td><span style="color:#2575fc; font-weight:bold;">${item.cat || '-'}</span></td>
                    <td><b>${item.id}</b></td>
                    <td>${item.name}</td>
                    <td>${item.qty}</td>
                    <td>${item.loc}</td>
                    <td>
                        <button class="btn-edit" onclick="editRow(${index})">แก้ไข</button>
                        <button class="btn-delete" onclick="deleteItem(${index})">ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function openModal(itemIdx, imgIdx) {
        currentImageSet = stockData[itemIdx].imgs || [];
        currentImageIndex = imgIdx;
        if (currentImageSet.length > 0) {
            document.getElementById('imageModal').style.display = 'flex';
            updateModalImage();
        }
    }

    function changeSlide(n) {
        currentImageIndex += n;
        if (currentImageIndex >= currentImageSet.length) currentImageIndex = 0;
        if (currentImageIndex < 0) currentImageIndex = currentImageSet.length - 1;
        updateModalImage();
    }

    function updateModalImage() {
        document.getElementById('fullImage').src = currentImageSet[currentImageIndex];
        document.getElementById('imageCounter').innerHTML = `${currentImageIndex + 1} / ${currentImageSet.length}`;
        const btns = document.querySelectorAll('.prev, .next');
        btns.forEach(btn => btn.style.display = currentImageSet.length > 1 ? 'block' : 'none');
    }

    function closeModal() { document.getElementById('imageModal').style.display = 'none'; }

    window.onclick = (e) => { if (e.target == document.getElementById('imageModal')) closeModal(); }

    function editRow(index) {
        const item = stockData[index];
        const row = document.getElementById('tableBody').querySelectorAll('tr')[0]; // ตัวแปร row ในโหมดแก้ไข
        // หาแถวที่ตรงกับ Index จริงในตาราง (กรองแล้ว)
        const rows = document.getElementById('tableBody').rows;
        let targetRow;
        for(let r of rows) {
            if(r.innerHTML.includes(`editRow(${index})`)) targetRow = r;
        }

        targetRow.innerHTML = `
            <td>(คงเดิม)</td>
            <td><input type="date" id="eDate${index}" class="edit-input" value="${item.date}"></td>
            <td>
                <select id="eCat${index}" class="edit-input">
                    <option value="drive 08" ${item.cat=='drive 08'?'selected':''}>drive 08</option>
                    <option value="drive 16" ${item.cat=='drive 16'?'selected':''}>drive 16</option>
                    <option value="drive 32" ${item.cat=='drive 32'?'selected':''}>drive 32</option>
                    <option value="drive 48" ${item.cat=='drive 48'?'selected':''}>drive 48</option>
                    <option value="drive 64" ${item.cat=='drive 64'?'selected':''}>drive 64</option>
                    <option value="KPS" ${item.cat=='KPS'?'selected':''}>KPS</option>
                    <option value="MFC" ${item.cat=='MFC'?'selected':''}>MFC</option>
                    <option value="DSE" ${item.cat=='DSE'?'selected':''}>DSE</option>
                    <option value="Safety95" ${item.cat=='Safety95'?'selected':''}>Safety95</option>
                    <option value="SafetyXP" ${item.cat=='SafetyXP'?'selected':''}>SafetyXP</option>
                    <option value="Com95" ${item.cat=='Com95'?'selected':''}>Com95</option>
                    <option value="ComXP" ${item.cat=='ComXP'?'selected':''}>ComXP</option>
                    <option value="การ์ดจอ" ${item.cat=='การ์ดจอ'?'selected':''}>การ์ดจอ</option>
                </select>
            </td>
            <td><input type="text" id="eId${index}" class="edit-input" value="${item.id}"></td>
            <td><input type="text" id="eName${index}" class="edit-input" value="${item.name}"></td>
            <td><input type="number" id="eQty${index}" class="edit-input" value="${item.qty}"></td>
            <td><input type="text" id="eLoc${index}" class="edit-input" value="${item.loc}"></td>
            <td><button class="btn-nav" style="padding:5px 10px;" onclick="saveEdit(${index})">บันทึก</button></td>
        `;
    }

    function saveEdit(index) {
        stockData[index].date = document.getElementById(`eDate${index}`).value;
        stockData[index].cat = document.getElementById(`eCat${index}`).value;
        stockData[index].id = document.getElementById(`eId${index}`).value;
        stockData[index].name = document.getElementById(`eName${index}`).value;
        stockData[index].qty = document.getElementById(`eQty${index}`).value;
        stockData[index].loc = document.getElementById(`eLoc${index}`).value;
        localStorage.setItem('myStock', JSON.stringify(stockData));
        renderTable();
    }

    function deleteItem(index) {
        if(confirm('ยืนยันการลบ?')) {
            stockData.splice(index, 1);
            localStorage.setItem('myStock', JSON.stringify(stockData));
            renderTable();
        }
    }

    renderTable();
</script>
</body>
</html>
