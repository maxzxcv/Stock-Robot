<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังสินค้า - Repairaf</title>
    <style>
        /* สไตล์พื้นฐาน */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10px; background-color: #f0f2f5; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Header ปรับให้ซ้อนกันในมือถือ */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
        h2 { color: #2575fc; margin: 0; font-size: 1.5rem; }
        
        .btn-nav { background: #28a745; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; white-space: nowrap; font-size: 14px; }
        .btn-nav:hover { background: #218838; }

        /* ส่วนค้นหา */
        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 2; min-width: 200px; padding: 12px; border: 2px solid #2575fc; border-radius: 8px; font-size: 16px; outline: none; }
        .category-filter { flex: 1; min-width: 150px; padding: 12px; border: 2px solid #2575fc; border-radius: 8px; font-size: 16px; background: white; cursor: pointer; }

        /* ตาราง - ทำให้ Scroll แนวนอนได้ในคอม */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #2575fc; color: white; white-space: nowrap; }
        
        /* สไตล์ปุ่มและสถานะ */
        .btn-show-img { background: #6a11cb; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .btn-edit { background: #ffc107; color: black; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .edit-input { width: 100%; padding: 8px; border: 1px solid #2575fc; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px; font-size: 14px; }

        /* ปรับปรุงการแสดงผลรูปภาพแก้ไข */
        .edit-img-preview-container { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
        .edit-img-item { position: relative; display: inline-block; }
        .edit-img-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .btn-remove-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Modal รูปภาพ - ปรับให้พอดีหน้าจอมือถือ */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 95%; height: 80%; }
        .modal-content { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }
        .close-modal { position: absolute; top: -50px; right: 0; color: white; font-size: 40px; cursor: pointer; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; padding: 12px; color: white; font-weight: bold; font-size: 30px; background-color: rgba(0,0,0,0.5); border: none; border-radius: 50%; user-select: none; }
        .next { right: 5px; } .prev { left: 5px; }
        .numbertext { color: #f2f2f2; font-size: 14px; position: absolute; top: -40px; left: 10px; }

        /* Media Query สำหรับโทรศัพท์หน้าจอเล็ก */
        @media screen and (max-width: 600px) {
            .header-flex { flex-direction: column; align-items: flex-start; }
            .btn-nav { width: 100%; text-align: center; }
            
            /* เปลี่ยนตารางเป็นแบบ Card เพื่อให้อ่านง่ายในมือถือ */
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #ccc; margin-bottom: 15px; border-radius: 8px; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
            td { border: none; border-bottom: 1px solid #eee; position: relative; padding-left: 40%; padding-top: 10px; padding-bottom: 10px; min-height: 30px; }
            td:last-child { border-bottom: none; }
            td:before { position: absolute; left: 10px; width: 35%; padding-right: 10px; white-space: nowrap; font-weight: bold; color: #2575fc; content: attr(data-label); }
            
            .edit-input { width: 100%; }
            .btn-show-img { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>📦 รายการสต็อก</h2>
        <a href="add_Item.html" class="btn-nav">+ เพิ่มสินค้าใหม่</a>
    </div>

    <div class="filter-section">
        <select id="catFilter" class="category-filter" onchange="renderTable()">
            <option value="">-- ทุกหมวดหมู่ --</option>
            <option value="drive 08">drive 08</option>
            <option value="drive 16">drive 16</option>
            <option value="drive 32">drive 32</option>
            <option value="drive 48">drive 48</option>
            <option value="drive 64">drive 64</option>
            <option value="KPS">KPS</option>
            <option value="MFC">MFC</option>
            <option value="DSE">DSE</option>
            <option value="Safety95">Safety95</option>
            <option value="SafetyXP">SafetyXP</option>
            <option value="Com95">Com95</option>
            <option value="ComXP">ComXP</option>
            <option value="การ์ดจอ">การ์ดจอ</option>
        </select>
        <input type="text" id="searchInput" class="search-box" onkeyup="renderTable()" placeholder="🔍 ค้นหา...">
    </div>

    <div class="table-responsive">
        <table id="stockTable">
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>หมวดหมู่</th>
                    <th>รหัส</th>
                    <th>อาการ</th>
                    <th>จำนวน</th>
                    <th>ที่เก็บ</th>
                    <th>จัดการ</th>
                    <th style="width: 120px;">รูปภาพ</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="imageModal" class="modal">
    <div class="modal-content-wrapper">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="numbertext" id="imageCounter">1 / 1</div>
        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <img class="modal-content" id="fullImage">
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>
</div>

<script>
    // URL ของ Google Apps Script ของคุณ
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyDWc85DoOYT3SH4w2FgnAdRN92Rc_ZWGz-t_xXJFRXnetJy4KfG9YuFc3O789TudTkMg/exec';
    
    let stockData = []; // เปลี่ยนจาก localStorage เป็น Array ว่างเพื่อรอรับข้อมูลจาก Server
    let currentImageSet = [];
    let currentImageIndex = 0;
    let tempEditImgs = [];

    // 1. ฟังก์ชันดึงข้อมูลจาก Google Sheets (โหลดเมื่อเปิดหน้าเว็บ)
    async function fetchData() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">⌛ กำลังโหลดข้อมูล...</td></tr>';
        
        try {
            const response = await fetch(scriptURL);
            stockData = await response.json();
            renderTable();
        } catch (error) {
            console.error('Error fetching data:', error);
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:red;">❌ ไม่สามารถโหลดข้อมูลได้</td></tr>';
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const filterText = document.getElementById('searchInput').value.toUpperCase();
        const filterCat = document.getElementById('catFilter').value;
        tbody.innerHTML = '';
        
        stockData.forEach((item, index) => {
            const matchText = (item.id || '').toUpperCase().includes(filterText) || 
                              (item.name || '').toUpperCase().includes(filterText) || 
                              (item.loc || '').toUpperCase().includes(filterText);
            const matchCat = filterCat === "" || item.cat === filterCat;

            if (matchText && matchCat) {
                const tr = document.createElement('tr');
                // ตรวจสอบว่า imgs เป็น Array หรือ String JSON
                let images = [];
                try {
                    images = typeof item.imgs === 'string' ? JSON.parse(item.imgs) : (item.imgs || []);
                } catch(e) { images = []; }
                
                const imgCount = images.length;
                let photoCell = imgCount > 0 
                    ? `<button class="btn-show-img" onclick="openModal(${index}, 0)">🖼️ ดูรูป (${imgCount})</button>`
                    : `<span class="no-img">ไม่มีรูป</span>`;

                tr.innerHTML = `
                    <td data-label="วันที่">${item.date}</td>
                    <td data-label="หมวดหมู่"><span style="color:#2575fc; font-weight:bold;">${item.cat || '-'}</span></td>
                    <td data-label="รหัส"><b>${item.id}</b></td>
                    <td data-label="อาการ">${item.name}</td>
                    <td data-label="จำนวน">${item.qty}</td>
                    <td data-label="ที่เก็บ">${item.loc}</td>
                    <td data-label="จัดการ">
                        <button class="btn-edit" onclick="editRow(${index})">แก้ไข</button>
                        <button class="btn-delete" onclick="deleteItem(${index})">ลบ</button>
                    </td>
                    <td data-label="รูปภาพ">${photoCell}</td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    // 2. ฟังก์ชันบันทึกการแก้ไข (ส่งข้อมูลไป GAS)
    async function saveEdit(index) {
        const btn = event.target;
        btn.innerText = '⌛...';
        btn.disabled = true;

        const updatedItem = {
            action: 'update', // เพิ่มตัวระบุ action สำหรับฝั่ง Script
            rowIndex: index + 2, // +2 เพราะแถวแรกเป็น Header และ Index เริ่มที่ 0
            date: document.getElementById(`eDate${index}`).value,
            cat: document.getElementById(`eCat${index}`).value,
            id: document.getElementById(`eId${index}`).value,
            name: document.getElementById(`eName${index}`).value,
            qty: document.getElementById(`eQty${index}`).value,
            loc: document.getElementById(`eLoc${index}`).value,
            imgs: JSON.stringify(tempEditImgs)
        };

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(updatedItem)
            });
            alert('อัปเดตข้อมูลเรียบร้อย!');
            fetchData(); // โหลดข้อมูลใหม่
        } catch (error) {
            alert('เกิดข้อผิดพลาดในการบันทึก');
            btn.innerText = 'บันทึก';
            btn.disabled = false;
        }
    }

    // 3. ฟังก์ชันลบข้อมูล
    async function deleteItem(index) {
        if(confirm('ยืนยันการลบข้อมูลแถวนี้อย่างถาวร?')) {
            const deleteData = {
                action: 'delete',
                rowIndex: index + 2
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(deleteData)
                });
                alert('ลบข้อมูลเรียบร้อย!');
                fetchData();
            } catch (error) {
                alert('ไม่สามารถลบข้อมูลได้');
            }
        }
    }

    // ฟังก์ชันจัดการรูปภาพ (เหมือนเดิม)
    function editRow(index) {
        const item = stockData[index];
        let images = [];
        try { images = typeof item.imgs === 'string' ? JSON.parse(item.imgs) : (item.imgs || []); } catch(e) {}
        tempEditImgs = [...images];
        
        const rows = document.getElementById('tableBody').rows;
        let targetRow;
        for(let r of rows) {
            if(r.innerHTML.includes(`editRow(${index})`)) targetRow = r;
        }
        renderEditRow(targetRow, index, item);
    }

    // ... (ฟังก์ชัน renderEditRow, handleEditFiles, modal อื่นๆ คงเดิมตามโค้ดต้นฉบับของคุณ) ...

    // เริ่มต้นดึงข้อมูลเมื่อโหลดหน้า
    fetchData();
</script>
</body>
</html>
