<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เพิ่มสต็อก - Repairaf</title>
    <style>
        /* รีเซ็ตพื้นฐาน */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 12px; 
            background-color: #f0f2f5; 
            margin: 0;
            color: #1c1e21;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
        }

        h2 { 
            color: #2575fc; 
            text-align: center; 
            margin: 0 0 20px 0;
            font-size: 1.4rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .form-group { 
            margin-bottom: 15px; 
            flex: 1;
        }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: #4b4f56;
            font-size: 14px;
        }
        
        /* ปรับขนาด Input ให้เหมาะกับนิ้วมือ (Touch Friendly) */
        input[type="text"], 
        input[type="number"], 
        input[type="date"], 
        select {
            width: 100%; 
            height: 45px; 
            padding: 0 12px; 
            border: 1.5px solid #dddfe2; 
            border-radius: 10px; 
            font-size: 16px; /* ป้องกัน iOS Auto-zoom */
            outline: none;
            background-color: #f5f6f7;
            transition: all 0.2s;
        }
        
        input:focus, select:focus {
            border-color: #2575fc;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 117, 252, 0.1);
        }

        /* ตกแต่งส่วนอัปโหลดไฟล์ */
        .file-upload-wrapper {
            position: relative;
            background: #f0f2f5;
            border: 2px dashed #ccd0d5;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        input[type="file"] {
            width: 100%;
            font-size: 14px;
        }

        .btn-submit { 
            background: linear-gradient(135deg, #6a11cb, #2575fc); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px;
            font-size: 17px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(37, 117, 252, 0.3);
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-submit:active { transform: scale(0.97); opacity: 0.9; }
        .btn-submit:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        .btn-back { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #606770; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 500;
        }

        /* พรีวิวรูปภาพแบบ Grid */
        #preview-container { 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
            margin-top: 12px; 
        }

        .preview-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-img { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
        }

        /* สำหรับหน้าจอเล็กมาก */
        @media (max-width: 360px) {
            .form-row { flex-direction: column; gap: 0; }
            #preview-container { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 เพิ่มสต็อกสินค้า</h2>
    <form id="addItemForm">
        <div class="form-row">
            <div class="form-group">
                <label>📅 วันที่รับเข้า</label>
                <input type="date" id="itemDate" required>
            </div>
            <div class="form-group">
                <label>📁 หมวดหมู่</label>
                <select id="itemCat" required>
                    <option value="" disabled selected>เลือก...</option>
                    <option value="drive 08">drive 08</option>
                    <option value="drive 16">drive 16</option>
                    <option value="drive 32">drive 32</option>
                    <option value="drive 48">drive 48</option>
                    <option value="drive 64">drive 64</option>
                    <option value="KPS">KPS</option>
                    <option value="MFC">MFC</option>
                    <option value="DSE">DSE</option>
                    <option value="Safety95">Safety95</option>
                    <option value="SafetyXP">SafetyXP</option>
                    <option value="Com95">Com95</option>
                    <option value="ComXP">ComXP</option>
                    <option value="การ์ดจอ">การ์ดจอ</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>🆔 รหัสสินค้า (SKU/ID)</label>
            <input type="text" id="itemId" placeholder="กรอกรหัสสินค้า" required>
        </div>

        <div class="form-group">
            <label>🔧 อาการ/รายละเอียด</label>
            <input type="text" id="itemName" placeholder="ระบุอาการเสีย หรือข้อมูลเพิ่มเติม" required>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 0.4;">
                <label>🔢 จำนวน</label>
                <input type="number" id="itemQty" value="1" min="1" required>
            </div>
            <div class="form-group">
                <label>📍 สถานที่เก็บ</label>
                <input type="text" id="itemLoc" placeholder="เช่น ตู้ A ชั้น 2" required>
            </div>
        </div>

        <div class="form-group">
            <label>📸 รูปภาพสินค้า</label>
            <div class="file-upload-wrapper">
                <input type="file" id="itemImages" accept="image/*" multiple onchange="previewImages()">
            </div>
            <div id="preview-container"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">🚀 บันทึกข้อมูลลงระบบ</button>
        <a href="Search.html" class="btn-back">← กลับไปยังหน้าคลังสินค้า</a>
    </form>
</div>

<script>
    // ตั้งค่าวันที่ปัจจุบันเป็น Default
    document.getElementById('itemDate').valueAsDate = new Date();
    let base64Images = [];

    function previewImages() {
        const files = document.getElementById('itemImages').files;
        const container = document.getElementById('preview-container');
        container.innerHTML = '';
        base64Images = [];

        if (files.length > 0) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'preview-img-wrapper';
                    const img = document.createElement('img');
                    img.src = base64String;
                    img.className = 'preview-img';
                    wrapper.appendChild(img);
                    container.appendChild(wrapper);
                    base64Images.push(base64String);
                }
                reader.readAsDataURL(file);
            });
        }
    }

    document.getElementById('addItemForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        
        // ถามเพื่อความแน่ใจก่อนบันทึกบนมือถือ
        if(!confirm('ยืนยันการบันทึกข้อมูลหรือไม่?')) return;

        submitBtn.innerText = '⌛ กำลังบันทึกข้อมูล...';
        submitBtn.disabled = true;

        const formData = {
            date: document.getElementById('itemDate').value,
            cat: document.getElementById('itemCat').value,
            id: document.getElementById('itemId').value,
            name: document.getElementById('itemName').value,
            qty: document.getElementById('itemQty').value,
            loc: document.getElementById('itemLoc').value,
            imgs: JSON.stringify(base64Images)
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyDWc85DoOYT3SH4w2FgnAdRN92Rc_ZWGz-t_xXJFRXnetJy4KfG9YuFc3O789TudTkMg/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert('🚀 บันทึกสำเร็จเรียบร้อยแล้ว!');
            window.location.href = 'Search.html'; 
        })
        .catch(error => {
            console.error('Error:', error);
            alert('❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
            submitBtn.innerText = '🚀 บันทึกข้อมูล';
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
