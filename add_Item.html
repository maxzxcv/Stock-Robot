<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เพิ่มสต็อก - Repairaf</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            padding: 8px; 
            background-color: #f4f6f8; 
            margin: 0;
            box-sizing: border-box;
            color: #333;
        }

        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            background: white; 
            padding: 15px 18px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        h2 { 
            color: #2575fc; 
            text-align: center; 
            margin: 0 0 15px 0;
            font-size: 1.2rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-group { 
            margin-bottom: 12px; 
            flex: 1;
        }
        
        label { 
            display: block; 
            margin-bottom: 4px; 
            font-weight: 600; 
            color: #666;
            font-size: 13px;
        }
        
        input[type="text"], 
        input[type="number"], 
        input[type="date"], 
        select {
            width: 100%; 
            height: 38px; /* ลดความสูงลง */
            padding: 0 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 15px; /* ขนาดกำลังดีสำหรับมือถือ */
            outline: none;
            background-color: #fff;
            -webkit-appearance: none; 
        }
        
        input[type="file"] {
            width: 100%;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 6px;
            border: 1px dashed #ccc;
            font-size: 12px;
        }

        select:focus, input:focus { border-color: #2575fc; }
        
        .btn-submit { 
            background: linear-gradient(135deg, #6a11cb, #2575fc); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px;
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(37, 117, 252, 0.2);
        }

        .btn-submit:active { transform: scale(0.98); }
        
        .btn-back { 
            display: block; 
            text-align: center; 
            margin-top: 15px; 
            color: #999; 
            text-decoration: none; 
            font-size: 13px;
        }

        #preview-container { 
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* เพิ่มเป็น 5 รูปต่อแถวเพื่อให้ดูเล็กลง */
            gap: 5px; 
            margin-top: 8px; 
        }

        .preview-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; 
        }

        .preview-img { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
            border-radius: 4px; 
            border: 1px solid #eee; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 เพิ่มสต็อก</h2>
    <form id="addItemForm">
        <div class="form-row">
            <div class="form-group">
                <label>วันที่รับเข้า</label>
                <input type="date" id="itemDate" required>
            </div>
            <div class="form-group">
                <label>หมวดหมู่</label>
                <select id="itemCat" required>
                    <option value="" disabled selected>เลือก...</option>
                    <option value="drive 08">drive 08</option>
                    <option value="drive 16">drive 16</option>
                    <option value="drive 32">drive 32</option>
                    <option value="drive 48">drive 48</option>
                    <option value="drive 64">drive 64</option>
                    <option value="KPS">KPS</option>
                    <option value="MFC">MFC</option>
                    <option value="DSE">DSE</option>
                    <option value="Safety95">Safety95</option>
                    <option value="SafetyXP">SafetyXP</option>
                    <option value="Com95">Com95</option>
                    <option value="ComXP">ComXP</option>
                    <option value="การ์ดจอ">การ์ดจอ</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>รหัสสินค้า</label>
            <input type="text" id="itemId" placeholder="เช่น SKU-001" required>
        </div>

        <div class="form-group">
            <label>อาการ</label>
            <input type="text" id="itemName" placeholder="ระบุอาการเสีย" required>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 0.4;">
                <label>จำนวน</label>
                <input type="number" id="itemQty" value="1" min="1" required>
            </div>
            <div class="form-group">
                <label>สถานที่เก็บ</label>
                <input type="text" id="itemLoc" placeholder="เช่น ชั้น A1" required>
            </div>
        </div>

        <div class="form-group">
            <label>รูปภาพสินค้า</label>
            <input type="file" id="itemImages" accept="image/*" multiple onchange="previewImages()">
            <div id="preview-container"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">🚀 บันทึกข้อมูล</button>
        <a href="Search.html" class="btn-back">← กลับหน้าหลัก</a>
    </form>
</div>

<script>
    document.getElementById('itemDate').valueAsDate = new Date();
    let base64Images = [];

    function previewImages() {
        const files = document.getElementById('itemImages').files;
        const container = document.getElementById('preview-container');
        container.innerHTML = '';
        base64Images = [];

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result;
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-img-wrapper';
                const img = document.createElement('img');
                img.src = base64String;
                img.className = 'preview-img';
                wrapper.appendChild(img);
                container.appendChild(wrapper);
                base64Images.push(base64String);
            }
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('addItemForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = '⌛ บันทึก...';
        submitBtn.disabled = true;

        const formData = {
            date: document.getElementById('itemDate').value,
            cat: document.getElementById('itemCat').value,
            id: document.getElementById('itemId').value,
            name: document.getElementById('itemName').value,
            qty: document.getElementById('itemQty').value,
            loc: document.getElementById('itemLoc').value,
            imgs: JSON.stringify(base64Images)
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyDWc85DoOYT3SH4w2FgnAdRN92Rc_ZWGz-t_xXJFRXnetJy4KfG9YuFc3O789TudTkMg/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert('🚀 บันทึกสำเร็จ!');
            window.location.href = 'Search.html'; 
        })
        .catch(error => {
            alert('เกิดข้อผิดพลาด');
            submitBtn.innerText = '🚀 บันทึกข้อมูล';
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
