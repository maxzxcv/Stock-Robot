<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เพิ่มสต็อก - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        
        body { font-family: 'Prompt', sans-serif; padding: 15px; background: #f4f7f6; margin: 0; color: #2d3748; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .header-flex { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .header-flex h2 { margin: 0; font-size: 22px; color: #2575fc; }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #4a5568; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 14px; 
            font-size: 15px; 
            font-family: 'Prompt';
            box-sizing: border-box; 
            background: #f8fafc;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #2575fc; 
            background: white; 
            outline: none; 
            box-shadow: 0 0 0 4px rgba(37, 117, 252, 0.1); 
        }

        .img-preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .img-preview-container img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid #edf2f7; }

        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, #2575fc 0%, #6a11cb 100%); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 6px 20px rgba(37,117,252,0.25);
            margin-top: 10px;
        }
        .btn-submit:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }
        
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #718096; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>📝 เพิ่มรายการอะไหล่ / บันทึกการซ่อม</h2>
    </div>

    <form id="addForm">
        <div class="form-group">
            <label>📅 วันที่รับเข้า</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>📁 หมวดหมู่สินค้า / อุปกรณ์</label>
            <select id="cat" required>
                <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                <option value="drive 08">drive 08</option>
                <option value="drive 16">drive 16</option>
                <option value="drive 32">drive 32</option>
                <option value="drive 48">drive 48</option>
                <option value="drive 64">drive 64</option>
                <option value="KPS">KPS</option>
                <option value="MFC">MFC</option>
                <option value="DSE">DSE</option>
                <option value="Safety95">Safety95</option>
                <option value="SafetyXP">SafetyXP</option>
                <option value="Com95">Com95</option>
                <option value="ComXP">ComXP</option>
                <option value="การ์ดจอ">การ์ดจอ</option>
            </select>
        </div>

        <div class="form-group">
            <label>🆔 รหัสสินค้า / บาร์โค้ด</label>
            <input type="text" id="id" placeholder="สแกนหรือพิมพ์รหัสสินค้า" required>
        </div>

        <div class="form-group">
            <label>🛠️ อาการที่พบ / ชื่ออะไหล่</label>
            <textarea id="name" rows="3" placeholder="ระบุชื่อหรือรายละเอียดอาการเสีย" required></textarea>
        </div>

        <div class="form-group">
            <label>📍 ที่เก็บ / ชั้นวางสินค้า</label>
            <input type="text" id="loc" placeholder="เช่น ชั้น A1, โซน B" required>
        </div>

        <div class="form-group">
            <label>📸 อัปโหลดรูปภาพ</label>
            <input type="file" id="files" accept="image/*" multiple onchange="previewImages()">
            <div class="img-preview-container" id="previewBox"></div>
        </div>

        <button type="submit" class="btn-submit" id="btn">💾 บันทึกข้อมูลลงชีท</button>
        <a href="Search.html" class="btn-back">⬅️ ย้อนกลับหน้าค้นหา</a>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCutSz_ARwozGu27NMPk0QZQixW2lGPisw",
        authDomain: "npstock-2d123.firebaseapp.com",
        projectId: "npstock-2d123",
        storageBucket: "npstock-2d123.firebasestorage.app",
        messagingSenderId: "247952845171",
        appId: "1:247952845171:web:20a33a3e66a16985d1bd06",
        measurementId: "G-13W5LN2TNQ"
    };
    firebase.initializeApp(firebaseConfig);

    // ตรวจสอบสถานะการ Login
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = 'login.html';
        }
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzZaWc5-m8MPykRQVzRyoCVR7zyF0Xn6C4Fpr8rkhcic5xbbhWAMB_DRFKvqfAF9zWo/exec';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    let images = [];

    function previewImages() {
        const container = document.getElementById('previewBox');
        container.innerHTML = '';
        images = [];
        
        const files = document.getElementById('files').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result);
                const img = document.createElement('img');
                img.src = e.target.result;
                container.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true; 
        btn.innerText = "⏳ กำลังบันทึกข้อมูล...";

        const payload = {
            date: document.getElementById('date').value,
            cat: document.getElementById('cat').value,
            id: document.getElementById('id').value,
            name: document.getElementById('name').value, 
            qty: "-", 
            loc: document.getElementById('loc').value,
            imgs: JSON.stringify(images)
        };

        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(payload) 
            });
            localStorage.removeItem('stock_cache');
            alert('✅ บันทึกรายการสำเร็จ!'); 
            window.location.href = 'Search.html';
        } catch (err) { 
            alert('❌ เกิดข้อผิดพลาด กรุณาลองใหม่'); 
            btn.disabled = false;
            btn.innerText = "💾 บันทึกข้อมูลลงชีท";
        }
    };
</script>
</body>
</html>
