<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เพิ่มสต็อก - Repairaf</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; height: 45px; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-submit { background: #2575fc; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #preview-container { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center">📦 เพิ่มสต็อกสินค้า</h2>
    <form id="addForm">
        <div class="form-group"><label>📅 วันที่</label><input type="date" id="date" required></div>
        <div class="form-group">
            <label>📁 หมวดหมู่</label>
            <select id="cat" required>
                <option value="drive 08">drive 08</option>
                <option value="drive 16">drive 16</option>
                <option value="drive 32">drive 32</option>
                </select>
        </div>
        <div class="form-group"><label>🆔 รหัสสินค้า</label><input type="text" id="id" required></div>
        <div class="form-group"><label>🔧 รายละเอียด/อาการ</label><input type="text" id="name" required></div>
        <div class="form-group"><label>🔢 จำนวน</label><input type="number" id="qty" value="1"></div>
        <div class="form-group"><label>📍 สถานที่เก็บ</label><input type="text" id="loc" required></div>
        <div class="form-group">
            <label>📸 รูปภาพ</label>
            <input type="file" id="files" accept="image/*" multiple onchange="handleFiles()">
            <div id="preview-container"></div>
        </div>
        <button type="submit" class="btn-submit" id="btn">🚀 บันทึกข้อมูล</button>
    </form>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
    let images = [];

    function handleFiles() {
        const files = document.getElementById('files').files;
        const container = document.getElementById('preview-container');
        container.innerHTML = ''; images = [];
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                images.push(e.target.result);
                const img = document.createElement('img');
                img.src = e.target.result; img.className = 'preview-img';
                container.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.disabled = true; btn.innerText = "⌛ กำลังบันทึก...";

        const payload = {
            date: document.getElementById('date').value,
            cat: document.getElementById('cat').value,
            id: document.getElementById('id').value,
            name: document.getElementById('name').value,
            qty: document.getElementById('qty').value,
            loc: document.getElementById('loc').value,
            imgs: JSON.stringify(images)
        };

        try {
            await fetch('ใhttps://script.google.com/macros/s/AKfycbxn1ejD3ge-5hPkk4YqvjmB-mqYkvwXI2v4tuPuS9eyhOuFJWS7CUsvc9ju0UlJejeT/execส่_URL_ที่ได้จาก_APPS_SCRIPT_ตรงนี้', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert('บันทึกสำเร็จ!');
            window.location.href = 'Search.html';
        } catch (err) { alert('ผิดพลาด!'); btn.disabled = false; }
    };
</script>
</body>
</html>
