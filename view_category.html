<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายการสินค้า - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; color: #333; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .btn-back { text-decoration: none; color: #2575fc; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .item-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; border-left: 6px solid #2575fc; cursor: pointer; }
        .item-info b { font-size: 1.1rem; color: #1a202c; }
        .item-info small { color: #718096; display: block; margin-top: 3px; }
        .thumb-preview { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumb-preview img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #eee; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 25px; width: 100%; max-width: 450px; overflow-y: auto; max-height: 90vh; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .slider-container { position: relative; background: #000; height: 250px; display: flex; align-items: center; justify-content: center; }
        .slider-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        
        .detail-body { padding: 20px; }
        .edit-mode { display: none; } 
        
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Prompt'; box-sizing: border-box; }
        label { font-size: 14px; font-weight: 600; color: #666; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-edit-trigger { background: #ff9800; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #fff5f5; color: #e53e3e; border: none; padding: 12px; border-radius: 10px; cursor: pointer; }
        .btn-close { grid-column: span 2; padding: 12px; border: 1px solid #ddd; background: #f8f9fa; border-radius: 10px; cursor: pointer; }
        
        /* สไตล์สำหรับการจัดการรูปในโหมดแก้ไข */
        #edit-thumb-container { display: flex; gap: 10px; overflow-x: auto; margin-top: 5px; margin-bottom: 15px; padding: 5px; }
        .thumb-wrapper { position: relative; flex-shrink: 0; }
        .thumb-wrapper img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid #eee; }
        .del-img-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 14px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
        
        .upload-placeholder { width: 80px; height: 80px; border: 2px dashed #ccc; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #999; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="header">
        <a href="Search.html" class="btn-back"><span>←</span> กลับ</a>
        <h2 id="catTitle">หมวดหมู่</h2>
    </div>

    <div id="list"></div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="slider-container">
                <button class="nav-btn" style="left:10px" onclick="changeImg(-1)">❮</button>
                <img id="mImg" src="">
                <button class="nav-btn" style="right:10px" onclick="changeImg(1)">❯</button>
            </div>
            
            <div class="detail-body">
                <div id="viewMode">
                    <h3 id="vName" style="margin:0 0 10px 0;"></h3>
                    <p>🆔 รหัส: <b id="vId"></b></p>
                    <p>🔢 คงเหลือ: <b id="vQty" style="color:#2575fc;"></b></p>
                    <p>📍 ที่เก็บ: <b id="vLoc"></b></p>
                    <div class="btn-group">
                        <button class="btn-edit-trigger" onclick="toggleEdit(true)">✏️ แก้ไขข้อมูล</button>
                        <button class="btn-delete" id="delBtn">🗑️ ลบ</button>
                        <button class="btn-close" onclick="closeModal()">ปิด</button>
                    </div>
                </div>

                <div id="editMode" class="edit-mode">
                    <h3 style="margin-top:0;">✏️ แก้ไขรายละเอียด</h3>
                    
                    <label>📸 จัดการรูปภาพ (คลิก X เพื่อลบ / คลิก + เพื่อเพิ่ม)</label>
                    <div id="edit-thumb-container"></div>
                    <input type="file" id="eFiles" accept="image/*" multiple style="display:none" onchange="addNewFiles()">
                    
                    <label>ชื่อสินค้า</label><input type="text" id="eName">
                    <label>รหัสสินค้า (ID)</label><input type="text" id="eId">
                    <label>จำนวน</label><input type="text" id="eQty">
                    <label>ที่เก็บ</label><input type="text" id="eLoc">
                    <div class="btn-group">
                        <button class="btn-save" id="saveBtn" onclick="saveEdit()">💾 บันทึกการเปลี่ยนแปลง</button>
                        <button class="btn-close" style="grid-column: span 1;" onclick="toggleEdit(false)">ยกเลิก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwFHTpy_PpSNvElpI91MwhnF6AXhuiEM0--KlJxwzH2LFQsbYRofVS9JSIr3ujpyXMo/exec';
    const cat = new URLSearchParams(window.location.search).get('cat');
    document.getElementById('catTitle').innerText = '📁 ' + cat;

    let currentImages = [], currentIndex = 0, currentItem = null;
    let editImages = []; 
    let stockData = JSON.parse(localStorage.getItem('stock_cache') || "[]");

    function renderList() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        const filtered = stockData.filter(i => i.cat === cat);
        if(filtered.length === 0) list.innerHTML = '<p style="text-align:center;color:#999;">ไม่มีสินค้า</p>';
        
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.onclick = () => openModal(item);
            let imgs = JSON.parse(item.img || "[]");
            div.innerHTML = `
                <div class="item-info">
                    <b>${item.name}</b>
                    <small>รหัส: ${item.id} | คงเหลือ: ${item.qty}</small>
                </div>
                <div class="thumb-preview">${imgs.map(src => `<img src="${src}">`).join('')}</div>
            `;
            list.appendChild(div);
        });
    }

    function openModal(item) {
        currentItem = item;
        toggleEdit(false);
        document.getElementById('vName').innerText = item.name;
        document.getElementById('vId').innerText = item.id;
        document.getElementById('vQty').innerText = item.qty;
        document.getElementById('vLoc').innerText = item.loc;
        
        document.getElementById('eName').value = item.name;
        document.getElementById('eId').value = item.id;
        document.getElementById('eQty').value = item.qty;
        document.getElementById('eLoc').value = item.loc;

        currentImages = JSON.parse(item.img || "[]");
        editImages = [...currentImages]; 
        
        currentIndex = 0;
        updateSlider();
        document.getElementById('delBtn').onclick = () => deleteItem(item.id, item.name);
        document.getElementById('modal').style.display = 'flex';
    }

    function toggleEdit(isEdit) {
        document.getElementById('viewMode').style.display = isEdit ? 'none' : 'block';
        document.getElementById('editMode').style.display = isEdit ? 'block' : 'none';
        if(isEdit) showEditThumbs();
    }

    // ฟังก์ชันแสดงรูปภาพในโหมดแก้ไข พร้อมปุ่มลบ
    function showEditThumbs() {
        const container = document.getElementById('edit-thumb-container');
        container.innerHTML = '';
        
        editImages.forEach((src, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'thumb-wrapper';
            wrapper.innerHTML = `
                <img src="${src}">
                <button class="del-img-btn" onclick="removeImage(${index})">×</button>
            `;
            container.appendChild(wrapper);
        });

        // ปุ่มบวกสำหรับเพิ่มรูป
        const addBtn = document.createElement('div');
        addBtn.className = 'upload-placeholder';
        addBtn.innerHTML = '<b>+</b>';
        addBtn.onclick = () => document.getElementById('eFiles').click();
        container.appendChild(addBtn);
    }

    // ฟังก์ชันลบรูปออกจาก Array ชั่วคราว
    function removeImage(index) {
        editImages.splice(index, 1);
        showEditThumbs();
    }

    // ฟังก์ชันเพิ่มรูปเข้าไปใน Array ชั่วคราว
    function addNewFiles() {
        const files = document.getElementById('eFiles').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                editImages.push(e.target.result);
                showEditThumbs();
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('eFiles').value = ''; // ล้างค่า input เพื่อให้เลือกไฟล์เดิมซ้ำได้
    }

    async function saveEdit() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; 
    btn.innerText = "⏳ กำลังบันทึก...";

    // ตรวจสอบว่า editImages มีข้อมูลรูปภาพใหม่จริงหรือไม่
    console.log("New images to save:", editImages);

    const updatedItem = {
        action: "edit",
        id: document.getElementById('eId').value,      // ต้องส่ง ID ไปเพื่อระบุแถว
        name: document.getElementById('eName').value,
        qty: document.getElementById('eQty').value,
        loc: document.getElementById('eLoc').value,
        cat: cat, 
        imgs: JSON.stringify(editImages)               // ส่ง Array รูปภาพใหม่ในรูปแบบ String
    };

    try {
        await fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(updatedItem) 
        });
        
        // ล้าง Cache เพื่อให้หน้าอื่นดึงรูปใหม่ไปแสดง
        localStorage.removeItem('stock_cache'); 
        
        alert('บันทึกรูปภาพและข้อมูลเรียบร้อย!');
        window.location.href = 'Search.html'; 
    } catch (e) {
        alert('เกิดข้อผิดพลาด');
        btn.disabled = false; 
        btn.innerText = "💾 บันทึกการเปลี่ยนแปลง";
    }
}
    function updateSlider() {
        const imgTag = document.getElementById('mImg');
        imgTag.src = currentImages[currentIndex] || 'https://via.placeholder.com/400x300?text=No+Image';
    }

    function changeImg(dir) {
        if(currentImages.length === 0) return;
        currentIndex = (currentIndex + dir + currentImages.length) % currentImages.length;
        updateSlider();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function deleteItem(id, name) {
        if (!confirm(`ต้องการลบ "${name}"?`)) return;
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", id: id, name: name }) });
            alert('ลบเรียบร้อย');
            location.reload();
        } catch (e) {}
    }

    renderList();
</script>
</body>
</html>
