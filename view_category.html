<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายการสินค้า - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; color: #333; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .btn-back { text-decoration: none; color: #2575fc; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .item-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; border-left: 6px solid #2575fc; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item-info b { font-size: 1.1rem; color: #1a202c; display: block; margin-bottom: 4px; }
        .item-info small { color: #718096; font-size: 0.85rem; }
        .thumb-preview { display: flex; gap: 5px; }
        .thumb-preview img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; border: 1px solid #edf2f7; }

        /* Modal Layer */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:999; padding: 10px; box-sizing: border-box; }
        .modal-content { background:white; padding:25px; border-radius:24px; width:100%; max-width:450px; position:relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        
        .slider { position: relative; width:100%; height:220px; background:#000; border-radius:16px; overflow:hidden; margin-bottom: 15px; }
        .slider img { width:100%; height:100%; object-fit: contain; }
        .slider-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.8); border:none; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; font-weight:bold; }
        
        .form-edit-group { margin-bottom: 12px; }
        .form-edit-group label { display:block; font-size:13px; font-weight:600; color:#4a5568; margin-bottom:4px; }
        .form-edit-group input { width:100%; padding:10px; border:1.5px solid #e2e8f0; border-radius:10px; font-family:'Prompt'; box-sizing: border-box; }

        .btn-orange { background:#f6ad55; color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer; width:48%; font-family:'Prompt'; }
        .btn-red { background:#fed7d7; color:#c53030; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer; width:48%; font-family:'Prompt'; }
        .btn-gray { background:#edf2f7; color:#4a5568; border:none; padding:12px; border-radius:12px; font-weight:bold; cursor:pointer; width:100%; margin-top:10px; font-family:'Prompt'; }

        .edit-thumb-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .thumb-wrapper { position: relative; width: 60px; height: 60px; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .del-img-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; }
        .upload-placeholder { width: 60px; height: 60px; border: 2px dashed #cbd5e0; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; background: #f7fafc; }
    </style>
</head>
<body>

<div class="header">
    <a href="Search.html" class="btn-back">⬅️ กลับ</a>
    <h3 id="catTitle" style="margin:0; font-size:1.3rem;">📁 รายการสินค้า</h3>
    <div style="width:40px;"></div>
</div>

<div id="list"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div id="viewMode">
            <div class="slider">
                <button class="slider-btn" style="left:10px;" onclick="changeImg(-1)">❮</button>
                <img id="mImg" src="">
                <button class="slider-btn" style="right:10px;" onclick="changeImg(1)">❯</button>
            </div>
            <h2 id="vName" style="margin:0 0 15px 0; font-size:1.4rem;"></h2>
            <p>🆔 <b>รหัส:</b> <span id="vId"></span></p>\n            <p>🔢 <b>คงเหลือ:</b> <span id="vQty"></span></p>
            <p>📍 <b>ที่เก็บ:</b> <span id="vLoc"></span></p>
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button class="btn-orange" onclick="toggleEdit(true)">✏️ แก้ไขข้อมูล</button>
                <button class="btn-red" id="delBtn">🗑️ ลบรายการ</button>
            </div>
        </div>

        <div id="editMode" style="display:none;">
            <h3>✏️ แก้ไขข้อมูลอะไหล่</h3>
            <div class="form-edit-group">
                <label>ชื่อสินค้า / อาการ</label>
                <input type="text" id="eName">
            </div>
            <div class="form-edit-group">
                <label>รหัสสินค้า (ID เปลี่ยนแปลงไม่ได้)</label>
                <input type="text" id="eId" readonly style="background:#edf2f7;">
            </div>
            <div class="form-edit-group">
                <label>จำนวนคงเหลือ</label>
                <input type="text" id="eQty">
            </div>
            <div class="form-edit-group">
                <label>สถานที่เก็บ</label>
                <input type="text" id="eLoc">
            </div>
            <div class="form-edit-group">
                <label>จัดการรูปภาพ</label>
                <input type="file" id="eFiles" accept="image/*" multiple onchange="addNewFiles()" style="display:none;">
                <div class="edit-thumb-container" id="edit-thumb-container"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px;">
                <button class="btn-orange" id="saveBtn" onclick="saveEdit()" style="background:#28a745; width:100%;">💾 บันทึกการเปลี่ยนแปลง</button>
            </div>
        </div>

        <button class="btn-gray" onclick="closeModal()">ปิดหน้าต่าง</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCutSz_ARwozGu27NMPk0QZQixW2lGPisw",
        authDomain: "npstock-2d123.firebaseapp.com",
        projectId: "npstock-2d123",
        storageBucket: "npstock-2d123.firebasestorage.app",
        messagingSenderId: "247952845171",
        appId: "1:247952845171:web:20a33a3e66a16985d1bd06",
        measurementId: "G-13W5LN2TNQ"
    };
    firebase.initializeApp(firebaseConfig);

    // ตรวจสอบสถานะการ Login
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = 'login.html';
        }
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzZaWc5-m8MPykRQVzRyoCVR7zyF0Xn6C4Fpr8rkhcic5xbbhWAMB_DRFKvqfAF9zWo/exec';
    const cat = new URLSearchParams(window.location.search).get('cat');
    document.getElementById('catTitle').innerText = '📁 ' + cat;

    let currentImages = [], currentIndex = 0, currentItem = null;
    let editImages = []; 
    let stockData = JSON.parse(localStorage.getItem('stock_cache') || "[]");

    function resizeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                };
            };
        });
    }

    function renderList() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        const filtered = stockData.filter(i => i.cat === cat);
        if(filtered.length === 0) list.innerHTML = '<p style="text-align:center;color:#999;">ไม่มีสินค้า</p>';
        
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.onclick = () => openModal(item);
            let imgs = [];
            try { imgs = JSON.parse(item.img || "[]"); } catch(e){}
            div.innerHTML = `
                <div class="item-info">
                    <b>${item.name}</b>
                    <small>รหัส: ${item.id} | คงเหลือ: ${item.qty} | ที่เก็บ: ${item.loc}</small>
                </div>
                <div class="thumb-preview">${imgs.map(src => `<img src="${src}">`).join('')}</div>
            `;
            list.appendChild(div);
        });
    }

    function openModal(item) {
        currentItem = item;
        toggleEdit(false);
        document.getElementById('vName').innerText = item.name;
        document.getElementById('vId').innerText = item.id;
        document.getElementById('vQty').innerText = item.qty;
        document.getElementById('vLoc').innerText = item.loc;
        
        document.getElementById('eName').value = item.name;
        document.getElementById('eId').value = item.id;
        document.getElementById('eQty').value = item.qty;
        document.getElementById('eLoc').value = item.loc;

        try { currentImages = JSON.parse(item.img || "[]"); } catch(e){ currentImages = []; }
        editImages = [...currentImages]; 
        
        currentIndex = 0;
        updateSlider();
        document.getElementById('delBtn').onclick = () => deleteItem(item.id, item.name);
        document.getElementById('modal').style.display = 'flex';
    }

    function toggleEdit(isEdit) {
        document.getElementById('viewMode').style.display = isEdit ? 'none' : 'block';
        document.getElementById('editMode').style.display = isEdit ? 'block' : 'none';
        if(isEdit) showEditThumbs();
    }

    function showEditThumbs() {
        const container = document.getElementById('edit-thumb-container');
        container.innerHTML = '';
        editImages.forEach((src, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'thumb-wrapper';
            wrapper.innerHTML = `
                <img src="${src}">
                <button class="del-img-btn" onclick="removeImage(${index})">×</button>
            `;
            container.appendChild(wrapper);
        });
        const addBtn = document.createElement('div');
        addBtn.className = 'upload-placeholder';
        addBtn.innerHTML = '<b>+</b>';
        addBtn.onclick = () => document.getElementById('eFiles').click();
        container.appendChild(addBtn);
    }

    function removeImage(index) {
        editImages.splice(index, 1);
        showEditThumbs();
    }

    async function addNewFiles() {
        const files = document.getElementById('eFiles').files;
        if (files.length === 0) return;
        
        for (let file of files) {
            const resizedBase64 = await resizeImage(file);
            editImages.push(resizedBase64);
        }
        showEditThumbs();
        document.getElementById('eFiles').value = ''; 
    }

    async function saveEdit() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; 
        btn.innerText = "⏳ กำลังบันทึก...";

        const updatedItem = {
            action: "edit",
            id: document.getElementById('eId').value,
            name: document.getElementById('eName').value,
            qty: document.getElementById('eQty').value,
            loc: document.getElementById('eLoc').value,
            cat: cat,
            img: JSON.stringify(editImages) 
        };

        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(updatedItem) 
            });
            
            localStorage.removeItem('stock_cache'); 
            alert('✅ บันทึกการเปลี่ยนแปลงเรียบร้อย!');
            window.location.href = 'Search.html'; 
        } catch (e) {
            alert('❌ เกิดข้อผิดพลาด');
            btn.disabled = false; 
            btn.innerText = "💾 บันทึกการเปลี่ยนแปลง";
        }
    }

    function updateSlider() {
        const imgTag = document.getElementById('mImg');
        imgTag.src = currentImages[currentIndex] || 'https://via.placeholder.com/400x300?text=No+Image';
    }

    function changeImg(dir) {
        if(currentImages.length === 0) return;
        currentIndex = (currentIndex + dir + currentImages.length) % currentImages.length;
        updateSlider();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function deleteItem(id, name) {
        if (!confirm(`ต้องการลบ "${name}"?`)) return;
        try {
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: "delete", id: id }) 
            });
            localStorage.removeItem('stock_cache');
            alert('ลบเรียบร้อย');
            window.location.href = 'Search.html';
        } catch (e) { alert('ลบไม่สำเร็จ'); }
    }

    renderList();
</script>
</body>
</html>
