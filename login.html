<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #f0f7ff 0%, #e0e7ff 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-family: 'Prompt'; font-size: 15px; background: #f8fafc; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 10px 15px rgba(37, 117, 252, 0.2); }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="color: #2575fc; margin-bottom: 25px;">🔐 เข้าสู่ระบบใช้งาน</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="อีเมลส่วนบุคคล" required>
        <input type="password" id="password" placeholder="รหัสผ่าน" required>
        <button type="submit" class="btn-login" id="loginBtn">ยืนยันตัวตน</button>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // อัปเดตเป็นค่าเฉพาะสำหรับโปรเจกต์ npstock-2d123 เรียบร้อยแล้ว
    const firebaseConfig = {
        apiKey: "AIzaSyCutSz_ARwozGu27NMPk0QZQixW2lGPisw",
        authDomain: "npstock-2d123.firebaseapp.com",
        projectId: "npstock-2d123",
        storageBucket: "npstock-2d123.firebasestorage.app",
        messagingSenderId: "247952845171",
        appId: "1:247952845171:web:20a33a3e66a16985d1bd06",
        measurementId: "G-13W5LN2TNQ"
    };
    
    // เริ่มต้นระบบ Firebase
    firebase.initializeApp(firebaseConfig);

    // ตรวจสอบข้อมูลเมื่อกดยืนยันตัวตน
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = "⏳ กำลังตรวจสอบ...";

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await firebase.auth().signInWithEmailAndPassword(email, password);
            alert('✅ ยืนยันตัวตนสำเร็จ');
            window.location.href = 'index.html'; // ล็อกอินผ่านแล้วเด้งไปหน้าหลัก
        } catch (error) {
            alert('❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง หรือคุณไม่มีสิทธิ์เข้าใช้งาน');
            btn.disabled = false;
            btn.innerText = "ยืนยันตัวตน";
        }
    };
</script>
</body>
</html>
