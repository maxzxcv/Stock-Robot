<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Repair Stock</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; /* ใช้ min-height แทน height เพื่อป้องกันเนื้อหาล้นในแนวตั้ง */
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            padding: 20px; /* เพิ่ม padding รอบๆ หน้าจอสำหรับมือถือ */
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px; /* ปรับ padding ให้กระชับขึ้น */
            border-radius: 20px;
            width: 100%; /* ให้กว้างเต็มที่ */
            max-width: 380px; /* แต่ไม่เกิน 380px */
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            box-sizing: border-box;
        }
        
        /* ปิด Hover Effect ในมือถือเพื่อความลื่นไหล */
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-5px);
            }
        }

        .card img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .title {
            font-size: clamp(24px, 5vw, 28px); /* ปรับขนาดฟอนต์ตามหน้าจออัตโนมัติ */
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        .subtitle {
            color: #666;
            font-size: clamp(16px, 4vw, 18px);
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            padding: 15px;
            border-radius: 30px;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4);
            -webkit-tap-highlight-color: transparent; /* ลบสีฟ้าเวลาคลิกบนมือถือ */
        }

        .btn:active {
            transform: scale(0.98); /* เพิ่ม Effect เวลาใช้นิ้วกด */
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #2575fc;
            line-height: 1.5;
            font-weight: 500;
        }

        /* ปรับแต่งพิเศษสำหรับหน้าจอขนาดเล็กมากๆ */
        @media screen and (max-width: 350px) {
            .card {
                padding: 30px 20px;
            }
            .title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<div class="card">
    <img src="Logo.jpg" alt="logo" onerror="this.src='https://via.placeholder.com/100?text=NP+Robotics'">

    <div class="title">ยินดีต้อนรับ</div>
    <div class="subtitle">Stock Robot Repair</div>

    <a href="Search.html" class="btn">🚀 เริ่มต้นใช้งาน</a>

    <div class="footer">
        บริษัท เอ็น.พี. โรโบติกส์ แอนด์ โซลูชั่น จำกัด <br>
        <small>© 2026 All Rights Reserved</small>
    </div>
</div>

</body>
</html>
