<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repair Stock</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2575fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Logodrive.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 5px solid #f0f7ff;
        }

        h2 { margin: 0; font-size: 26px; color: #2d3748; }
        .subtitle { color: #718096; margin-bottom: 35px; font-size: 15px; }

        .btn {
            display: block;
            padding: 16px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 10px 15px rgba(37, 117, 252, 0.2);
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <img src="LOGO.jpg" onerror="this.src='https://via.placeholder.com/120?text=Repair'">
        <h2>Repair Stock</h2>
        <p class="subtitle">ระบบจัดการอะไหล่และอุปกรณ์</p>
        <a href="Search.html" class="btn">เข้าสู่ระบบจัดการสต็อก</a>
    </div>

    <script>
        // ลงทะเบียน Service Worker เพื่อให้ติดตั้งแอปได้
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
