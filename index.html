<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repair Stock Solution</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2575fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logodrive.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0e7ff 100%);
            --accent-color: #2575fc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            width: 90%;
            max-width: 380px;
            text-align: center;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.1);
        }

        .logo-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 30px;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 20px rgba(37, 117, 252, 0.15);
        }

        .logo-glow {
            position: absolute;
            top: 10px; left: 10px; width: 110px; height: 110px;
            background: var(--primary-gradient);
            filter: blur(20px);
            opacity: 0.35;
            z-index: 1;
            border-radius: 30px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 26px;
            font-weight: 600;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin: 0 0 35px;
            font-size: 14px;
            color: #718096;
            line-height: 1.6;
        }

        .btn {
            display: block;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(37, 117, 252, 0.25);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(37, 117, 252, 0.2);
        }

        .btn-logout {
            background: none;
            border: none;
            color: #e53e3e;
            margin-top: 25px;
            font-family: 'Prompt';
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img src="logodrive.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/140x140/2575fc/ffffff?text=STOCK'">
        </div>
        
        <h2>Repair Stock</h2>
        <p class="subtitle">ระบบจัดการอะไหล่และอุปกรณ์<br>Robot Repair Center</p>
        
        <a href="Search.html" class="btn">เริ่มต้นใช้งานแอป</a>
        <button onclick="logout()" class="btn-logout">🚪 ออกจากระบบ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCutSz_ARwozGu27NMPk0QZQixW2lGPisw",
            authDomain: "npstock-2d123.firebaseapp.com",
            projectId: "npstock-2d123",
            storageBucket: "npstock-2d123.firebasestorage.app",
            messagingSenderId: "247952845171",
            appId: "1:247952845171:web:20a33a3e66a16985d1bd06",
            measurementId: "G-13W5LN2TNQ"
        };
        
        // เริ่มต้น Firebase
        firebase.initializeApp(firebaseConfig);

        // ตรวจสอบสถานะการ Login
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                // ถ้ายังไม่ได้ล็อกอิน ให้ไปหน้าล็อกอินทันที
                window.location.href = 'login.html';
            } else {
                // ตรวจสอบความปลอดภัยเสร็จค่อยเปิดการทำงาน Service Worker ป้องกันหน้าจอค้างขาว
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('sw.js')
                            .then(reg => console.log('Service Worker Registered'))
                            .catch(err => console.log('Service Worker Failed', err));
                    });
                }
            }
        });

        // ฟังก์ชันออกจากระบบ
        function logout() {
            if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
                firebase.auth().signOut().then(() => {
                    localStorage.removeItem('stock_cache');
                    window.location.href = 'login.html';
                });
            }
        }
    </script>
</body>
</html>
