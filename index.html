<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { margin: 0; padding: 20px; font-family: 'Prompt', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        img { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; border: 5px solid #f0f2f5; }
        .btn { display: block; padding: 15px; background: #2575fc; color: white; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <img src="Logo.jpg" onerror="this.src='https://via.placeholder.com/120?text=STOCK'">
        <h2>Repair Stock</h2>
        <p style="color: #666; margin-bottom: 30px;">ระบบจัดการอะไหล่และอุปกรณ์</p>
        <a href="Search.html" class="btn">เข้าสู่ระบบ</a>
    </div>
</body>
</html>
