<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repair Stock Solution</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2575fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logodrive.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-gradient: linear-gradient(135deg, #f0f7ff 0%, #e0e7ff 100%);
            --accent-color: #2575fc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        /* --- ลูกเล่นใหม่ที่ตัวภาพ --- */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
            z-index: 1;
        }

        /* เอฟเฟกต์แสงรัศมีด้านหลังภาพ */
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: var(--accent-color);
            filter: blur(45px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: -1;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        .logo-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: float-move 4s infinite ease-in-out;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* เมื่อเอาเมาส์วาง หรือแตะ */
        .card:hover .logo-img {
            transform: scale(1.15) rotate(8deg);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(37, 117, 252, 0.25);
        }

        /* Keyframes อนิเมชั่นลอย */
        @keyframes float-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-3deg); }
        }

        /* Keyframes แสงกระเพื่อม */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* --- ส่วนข้อมูลแอป --- */
        h2 { 
            margin: 0; 
            font-size: 28px; 
            color: #1a202c; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle { 
            color: #718096; 
            margin: 10px 0 40px 0; 
            font-size: 16px; 
            line-height: 1.5;
        }

        .btn {
            display: block;
            padding: 18px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 12px 20px rgba(37, 117, 252, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(37, 117, 252, 0.2);
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img src="logodrive.png" class="logo-img" alt="Logo" onerror="this.src='https://via.placeholder.com/140x140/2575fc/ffffff?text=STOCK'">
        </div>
        
        <h2>Repair Stock</h2>
        <p class="subtitle">ระบบจัดการอะไหล่และอุปกรณ์<br>Robot Repair Center</p>
        
        <a href="Search.html" class="btn">เริ่มต้นใช้งานแอป</a>
    </div>

    <script>
        // จดทะเบียน Service Worker สำหรับ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
</body>
</html>
