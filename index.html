<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - Repair Stock</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { margin: 0; font-family: 'Prompt', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at top left, #6a11cb 0%, #2575fc 100%); padding: 20px; box-sizing: border-box; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 50px 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #f0f2f5; margin-bottom: 25px; background: white; padding: 5px; }
        .title { font-size: 28px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
        .subtitle { color: #718096; font-size: 18px; margin-bottom: 35px; }
        .btn { display: block; padding: 16px; border-radius: 16px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; text-decoration: none; font-weight: 600; font-size: 18px; box-shadow: 0 10px 20px rgba(37, 117, 252, 0.3); transition: 0.3s; }
        .btn:active { transform: scale(0.97); }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #edf2f7; font-size: 13px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="card">
        <img src="Logo.jpg" alt="logo" onerror="this.src='https://via.placeholder.com/110?text=NP+Robot'">
        <div class="title">ยินดีต้อนรับ</div>
        <div class="subtitle">ระบบคลังสินค้า Robot Repair</div>
        <a href="Search.html" class="btn">🚀 เริ่มต้นใช้งาน</a>
        <div class="footer">
            <b style="color:#4a5568">บริษัท เอ็น.พี. โรโบติกส์ แอนด์ โซลูชั่น จำกัด</b><br>© 2026 All Rights Reserved
        </div>
    </div>
</body>
</html>
